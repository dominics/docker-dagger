log:
  level: INFO

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls: {}
    forwardedHeaders:
      trustedIPs:
        - "192.168.1.0/24"
        - "114.23.221.217/32"

providers:
  docker:
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: dominic@varspool.com
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web
