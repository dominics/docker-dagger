log:
  level: INFO

# Dashboard is reached via svc:traefik (Tailscale Service) on the loopback :8080 bind.
# `insecure: true` enables the built-in :8080 listener — only safe because the container
# port is bound to 127.0.0.1 in docker-compose.yml.
api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls: {}
    forwardedHeaders:
      trustedIPs:
        - "192.168.1.0/24"
        - "114.23.221.217/32"

providers:
  docker:
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: dominic@varspool.com
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web
