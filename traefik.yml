log:
  level: INFO

# NZ-only geoblock plugin for the public statio.nz route (middleware defined in
# dynamic.yml as `geoblock-nz`). Static config — a Traefik restart is required to
# download/load the plugin (a dynamic.yml file-watch reload is not enough).
experimental:
  plugins:
    geoblock:
      moduleName: github.com/PascalMinder/geoblock
      version: v0.3.7

# Dashboard is reached via svc:traefik (Tailscale Service) on the loopback :8080 bind.
# `insecure: true` enables the built-in :8080 listener — only safe because the container
# port is bound to 127.0.0.1 in docker-compose.yml.
api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls: {}
    forwardedHeaders:
      trustedIPs:
        - "192.168.1.0/24"
        - "114.23.221.217/32"

providers:
  docker:
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  # HTTP-01 for the public statio.nz route (validated by hitting :80 from the internet).
  letsencrypt:
    acme:
      email: dominic@varspool.com
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web

  # DNS-01 (Route53) for internal-only hosts whose names resolve to a private IP
  # (e.g. aiostreams.media.varspool.com → 192.168.1.200), which HTTP-01 can't validate.
  # Creds come from the AWS_* env vars on the traefik service (lego route53 provider).
  # Separate storage file avoids write races between the two resolvers. A static-config
  # change → full Traefik restart required (not just a dynamic.yml reload).
  letsencrypt-dns:
    acme:
      email: dominic@varspool.com
      storage: /etc/traefik/acme/acme-dns.json
      dnsChallenge:
        provider: route53
        # Check the TXT record via public resolvers, not LAN split-horizon DNS.
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
