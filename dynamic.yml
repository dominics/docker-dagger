http:
  routers:
    cdn-station:
      rule: "Host(`cdn.statio.nz`)"
      service: cdn-station
      tls:
        certResolver: letsencrypt
      entryPoints:
        - websecure

    plex:
      rule: "Host(`plex.media.varspool.com`)"
      service: plex
      tls: {}
      entryPoints:
        - websecure
      middlewares:
        - tailscale-only

  services:
    cdn-station:
      loadBalancer:
        servers:
          - url: "http://192.168.1.200:8181"

    plex:
      loadBalancer:
        servers:
          - url: "http://192.168.1.200:32400"

  middlewares:
    tailscale-only:
      ipAllowList:
        sourceRange:
          - "100.64.0.0/10"
          - "192.168.1.0/24"

tls:
  certificates:
    - certFile: /etc/traefik/ssl/*.media.varspool.com/cert.pem
      keyFile: /etc/traefik/ssl/*.media.varspool.com/key.pem
