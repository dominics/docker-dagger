http:
  routers:
    cdn-station:
      rule: "Host(`statio.nz`)"
      service: cdn-station
      tls:
        certResolver: letsencrypt
        domains:
          - main: "statio.nz"
            sans:
              - "www.statio.nz"
      entryPoints:
        - websecure

    cdn-station-www:
      rule: "Host(`www.statio.nz`)"
      service: cdn-station
      tls:
        certResolver: letsencrypt
        domains:
          - main: "statio.nz"
            sans:
              - "www.statio.nz"
      entryPoints:
        - websecure
      middlewares:
        - www-to-bare

  services:
    cdn-station:
      loadBalancer:
        servers:
          - url: "http://192.168.1.200:8181"

  middlewares:
    www-to-bare:
      redirectRegex:
        regex: "^https://www\\.statio\\.nz/(.*)"
        replacement: "https://statio.nz/${1}"
        permanent: true

    # Retained for any future internal services routed through Traefik.
    # The media services have moved to Tailscale Services (see tailscale/serve.json).
    tailscale-only:
      ipAllowList:
        sourceRange:
          - "100.64.0.0/10"
          - "192.168.1.0/24"
