http:
  routers:
    cdn-station:
      rule: "Host(`statio.nz`)"
      service: cdn-station
      tls:
        certResolver: letsencrypt
        domains:
          - main: "statio.nz"
            sans:
              - "www.statio.nz"
      entryPoints:
        - websecure
      middlewares:
        - geoblock-nz

    cdn-station-www:
      rule: "Host(`www.statio.nz`)"
      service: cdn-station
      tls:
        certResolver: letsencrypt
        domains:
          - main: "statio.nz"
            sans:
              - "www.statio.nz"
      entryPoints:
        - websecure
      middlewares:
        - geoblock-nz
        - www-to-bare

    # Internal-only HTTPS for the self-hosted AIOStreams LAN instance. Browser-based
    # Stremio blocks a plain-HTTP addon as mixed content, so it needs a trusted cert.
    # Cert via the letsencrypt-dns resolver (Route53 DNS-01) because the name resolves
    # to a private IP. Gated to LAN/tailnet by the tailscale-only middleware — never
    # public, despite the public DNS record.
    aiostreams:
      rule: "Host(`aiostreams.media.varspool.com`)"
      service: aiostreams-lan
      entryPoints:
        - websecure
      middlewares:
        - tailscale-only
      tls:
        certResolver: letsencrypt-dns

  services:
    cdn-station:
      loadBalancer:
        servers:
          - url: "http://192.168.1.200:8181"

    aiostreams-lan:
      loadBalancer:
        servers:
          - url: "http://aiostreams-lan:3000"

  middlewares:
    # NZ-only allowlist for the public statio.nz route. Uses the PascalMinder/geoblock
    # plugin (registered in traefik.yml). allowLocalRequests keeps LAN/Tailscale ops
    # paths working; country lookups go to get.geojs.io (cached).
    geoblock-nz:
      plugin:
        geoblock:
          silentStartUp: false
          allowLocalRequests: true
          logLocalRequests: false
          logAllowedRequests: false
          logApiRequests: false
          api: "https://get.geojs.io/v1/ip/country/{ip}"
          apiTimeoutMs: 750
          cacheSize: 100
          forceMonthlyUpdate: true
          allowUnknownCountries: false
          unknownCountryApiResponse: "nil"
          blackListMode: false
          addCountryHeader: false
          countries:
            - NZ

    www-to-bare:
      redirectRegex:
        regex: "^https://www\\.statio\\.nz/(.*)"
        replacement: "https://statio.nz/${1}"
        permanent: true

    # Retained for any future internal services routed through Traefik.
    # The media services have moved to Tailscale Services (see tailscale/serve.json).
    tailscale-only:
      ipAllowList:
        sourceRange:
          - "100.64.0.0/10"
          - "192.168.1.0/24"
