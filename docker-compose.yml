# Shared environment for both AIOStreams instances (LAN + tailnet). Anchored so the two
# services stay in lock-step on wiring; only BASE_URL / DB path / published port differ.
x-aiostreams-env: &aiostreams-env
  SECRET_KEY: ${AIOSTREAMS_SECRET_KEY:?Need to set AIOSTREAMS_SECRET_KEY (openssl rand -hex 32)}
  AIOSTREAMS_AUTH: ${AIOSTREAMS_AUTH:?Need to set AIOSTREAMS_AUTH (user:pass)}
  AIOSTREAMS_AUTH_ADMINS: ${AIOSTREAMS_AUTH_ADMINS:-}
  # Locked usenet wiring (nzbdav.* incl. aiostreamsAuth, which enables the built-in proxy
  # so WebDAV creds never appear in client stream URLs and bytes egress from dagger).
  FORCED_SERVICE_CREDENTIALS: ${AIOSTREAMS_FORCED_SERVICE_CREDENTIALS:?Set the locked nzbdav usenet wiring (see .env.example) — empty would disengage the built-in proxy and leak WebDAV creds into stream URLs}
  # Indexer search over the compose network.
  BUILTIN_PROWLARR_URL: "http://prowlarr:9696"
  BUILTIN_PROWLARR_API_KEY: ${PROWLARR_API_KEY:?Need to set PROWLARR_API_KEY}
  # Force the built-in proxy for debrid/torrent streams too (egress from dagger).
  FORCE_PROXY_ENABLED: "true"
  FORCE_PROXY_ID: "builtin"
  FORCE_PROXY_CREDENTIALS: ${AIOSTREAMS_PROXY_CREDENTIALS:?Set a user:pass from AIOSTREAMS_AUTH for the built-in proxy}
  TZ: ${TZ}

services:
  traefik:
    image: traefik:v3.6
    ports:
      - "80:80"
      - "443:443"
      # Dashboard / API on loopback only — exposed to the tailnet via svc:traefik.
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik-acme:/etc/traefik/acme
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr
    ports:
      - "127.0.0.1:8989:8989"
    volumes:
      - ${CONFIG_DIR:?Need to set CONFIG_DIR}/sonarr:/config
      - ${STORAGE_DIR:?Need to set STORAGE_DIR}/tv:/tv
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ:?Need to set TZ}
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - ${CONFIG_DIR}/radarr:/config
      - ${STORAGE_DIR}/movies:/movies
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr
    ports:
      - "127.0.0.1:8686:8686"
    volumes:
      - ${CONFIG_DIR}/lidarr:/config
      - ${STORAGE_DIR}/music:/music
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    ports:
      - "127.0.0.1:9696:9696"
    volumes:
      - ${CONFIG_DIR}/prowlarr:/config
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    restart: unless-stopped

