 # Plex runs in host network mode — routed via file provider in dynamic.yml
  plex:
    image: linuxserver/plex
    runtime: nvidia
    network_mode: "host"
    volumes:
      - ${CONFIG_DIR}/plex:/config
      - ${STORAGE_DIR}/movies:/data/movies
      - ${STORAGE_DIR}/tv:/data/tv
      - ${STORAGE_DIR}/transcode:/transcode
      - /dev/dri:/dev/dri
    environment:
      VERSION: public
      PUID: ${PUID}
      PGID: ${PGID}
      NVIDIA_VISIBLE_DEVICES: all
    restart: unless-stopped


volumes:
  traefik-acme:
