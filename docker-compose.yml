services:
  traefik:
    image: traefik:v3.6
    ports:
      - "80:80"
      - "443:443"
      # Dashboard / API on loopback only — exposed to the tailnet via svc:traefik.
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik-acme:/etc/traefik/acme
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr
    ports:
      - "127.0.0.1:8989:8989"
    volumes:
      - ${CONFIG_DIR:?Need to set CONFIG_DIR}/sonarr:/config
      - ${STORAGE_DIR:?Need to set STORAGE_DIR}/tv:/tv
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ:?Need to set TZ}
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - ${CONFIG_DIR}/radarr:/config
      - ${STORAGE_DIR}/movies:/movies
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr
    ports:
      - "127.0.0.1:8686:8686"
    volumes:
      - ${CONFIG_DIR}/lidarr:/config
      - ${STORAGE_DIR}/music:/music
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    ports:
      - "127.0.0.1:9696:9696"
    volumes:
      - ${CONFIG_DIR}/prowlarr:/config
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    restart: unless-stopped

