services:
  traefik:
    image: traefik:v3.6
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./ssl:/etc/traefik/ssl:ro
      - traefik-acme:/etc/traefik/acme
    labels:
      traefik.enable: "true"
      traefik.http.routers.dashboard.rule: "Host(`traefik.media.varspool.com`)"
      traefik.http.routers.dashboard.service: "api@internal"
      traefik.http.routers.dashboard.tls: "true"
      traefik.http.routers.dashboard.entrypoints: "websecure"
      traefik.http.routers.dashboard.middlewares: "tailscale-only@file"
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr
    ports:
      - "100.87.71.30:8989:8989"
    volumes:
      - ${CONFIG_DIR:?Need to set CONFIG_DIR}/sonarr:/config
      - ${STORAGE_DIR:?Need to set STORAGE_DIR}/tv:/tv
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ:?Need to set TZ}
    labels:
      traefik.enable: "true"
      traefik.http.routers.sonarr.rule: "Host(`sonarr.media.varspool.com`)"
      traefik.http.routers.sonarr.tls: "true"
      traefik.http.routers.sonarr.entrypoints: "websecure"
      traefik.http.routers.sonarr.middlewares: "tailscale-only@file"
      traefik.http.services.sonarr.loadbalancer.server.port: "8989"
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    ports:
      - "100.87.71.30:7878:7878"
    volumes:
      - ${CONFIG_DIR}/radarr:/config
      - ${STORAGE_DIR}/movies:/movies
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr.rule: "Host(`radarr.media.varspool.com`)"
      traefik.http.routers.radarr.tls: "true"
      traefik.http.routers.radarr.entrypoints: "websecure"
      traefik.http.routers.radarr.middlewares: "tailscale-only@file"
      traefik.http.services.radarr.loadbalancer.server.port: "7878"
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr
    ports:
      - "100.87.71.30:8686:8686"
    volumes:
      - ${CONFIG_DIR}/lidarr:/config
      - ${STORAGE_DIR}/music:/music
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    labels:
      traefik.enable: "true"
      traefik.http.routers.lidarr.rule: "Host(`lidarr.media.varspool.com`)"
      traefik.http.routers.lidarr.tls: "true"
      traefik.http.routers.lidarr.entrypoints: "websecure"
      traefik.http.routers.lidarr.middlewares: "tailscale-only@file"
      traefik.http.services.lidarr.loadbalancer.server.port: "8686"
    restart: unless-stopped

