 # Plex runs in host network mode so it stays reachable on the LAN (192.168.1.x:32400)
 # without Tailscale. svc:plex (configured in tailscale/serve.json) provides HTTPS to
 # tailnet clients on top of that.
  plex:
    image: linuxserver/plex
    runtime: nvidia
    network_mode: "host"
    volumes:
      - ${CONFIG_DIR}/plex:/config
      - ${STORAGE_DIR}/movies:/data/movies
      - ${STORAGE_DIR}/tv:/data/tv
      - ${STORAGE_DIR}/transcode:/transcode
      - /dev/dri:/dev/dri
    environment:
      VERSION: public
      PUID: ${PUID}
      PGID: ${PGID}
      NVIDIA_VISIBLE_DEVICES: all
    restart: unless-stopped


volumes:
  traefik-acme:
