  # nzbdav: Usenet-as-WebDAV. Mounts NZBs without downloading; exposes a
  # SABnzbd-compatible API for the *arrs and a WebDAV endpoint for streaming
  # (used by AIOStreams for Stremio streaming). See github.com/nzbdav-dev/nzbdav.
  # An optional rclone sidecar can mount the WebDAV onto the host filesystem
  # so Sonarr/Radarr can import files directly; not enabled yet (Stremio path
  # doesn't need it).
  # Bound to loopback only; reached over the tailnet via svc:nzbdav and over the compose
  # network by the *arrs (http://nzbdav:3000) and AIOStreams. No LAN binding: under
  # AIOStreams the TV's Stremio streams flow through the aiostreams-lan built-in proxy
  # (which fetches from nzbdav internally), so nzbdav is never exposed on the LAN — the
  # usenet WebDAV is only reachable from dagger itself or the tailnet. nzbdav's built-in
  # username/password is the auth for the loopback/tailnet side.
  nzbdav:
    image: ghcr.io/nzbdav-dev/nzbdav:latest
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ${CONFIG_DIR}/nzbdav:/config
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    restart: unless-stopped

  # Self-hosted AIOStreams — Stremio aggregator wired to our own nzbdav (usenet streaming)
  # + Prowlarr (indexers), replacing usenetstreamer. TWO instances because AIOStreams
  # builds every stream URL from a single BASE_URL (no request-host derivation): the TV
  # has no Tailscale client (LAN HTTP only), while the roaming phone reaches it over the
  # tailnet. Both share wiring via *aiostreams-env; behavioural config is set per-instance
  # in the UI (separate SQLite volumes).
  #
  # Usenet-IP guarantee: nzbdav holds the NNTP creds and does the fetching, so the provider
  # only ever sees dagger. nzbdav.aiostreamsAuth (in AIOSTREAMS_FORCED_SERVICE_CREDENTIALS)
  # forces the built-in proxy, keeping WebDAV creds out of the URLs handed to clients.
  aiostreams-lan:
    image: ghcr.io/viren070/aiostreams:latest
    ports:
      - "127.0.0.1:8083:3000"
      - "${LOCAL_IP}:8083:3000"
    environment:
      <<: *aiostreams-env
      # Hostname, not the bare IP: some Stremio clients reject a private-IP literal in
      # the manifest/stream URLs. media.varspool.com resolves to ${LOCAL_IP} on the LAN,
      # so this still hits this same :8083 bind — no Tailscale/Traefik involved. BASE_URL
      # is baked into the proxied stream URLs, so it must match what the client will use.
      BASE_URL: "http://media.varspool.com:8083"
      DATABASE_URI: "sqlite:///app/data/db.sqlite"
    volumes:
      - ${CONFIG_DIR}/aiostreams-lan:/app/data
    restart: unless-stopped

  # Tailnet instance for the roaming phone. Loopback-only bind; Tailscale Serve
  # (svc:aiostreams) terminates HTTPS and proxies to 127.0.0.1:8084.
  aiostreams-ts:
    image: ghcr.io/viren070/aiostreams:latest
    ports:
      - "127.0.0.1:8084:3000"
    environment:
      <<: *aiostreams-env
      BASE_URL: "https://aiostreams.royal-shark.ts.net"
      DATABASE_URI: "sqlite:///app/data/db.sqlite"
    volumes:
      - ${CONFIG_DIR}/aiostreams-ts:/app/data
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ${CONFIG_DIR}/sabnzbd:/config
      - ${STORAGE_DIR}/downloads:/downloads
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ:   ${TZ}
    restart: unless-stopped

